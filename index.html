      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .legenda-color {
      width: 18px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid white;
      box-shadow: 0 0 0 1px #999;

      max-width: 260px;
      font-family: 'Segoe UI', sans-serif;
    }
    .popup-header {

      padding: 10px 12px;
      margin: -13px -19px 10px;
      border-radius: 4px 4px 0 0;

      font-weight: 700;
      line-height: 1.3;
    }
    .popup-header .nome-scientifico {
      font-size: 0.75rem;
      font-style: italic;
      opacity: 0.85;
      margin-top: 2px;
    }
    .popup-body { padding: 0 2px; }
    .popup-id {
      display: inline-block;
      background: #e8f5e1;
      color: #2d5a1b;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .popup-note {
      background: #fffbea;
      border-left: 3px solid #e8b84b;
      padding: 5px 8px;
      font-size: 0.78rem;
      border-radius: 0 4px 4px 0;
      margin-bottom: 8px;
      color: #5a4a00;

      background: #e8f0e0;
      border: 1px dashed #7aab4a;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      font-size: 0.73rem;
      color: #5a7a3a;
      margin-top: 6px;
    }
    .popup-foto-placeholder .foto-icon { font-size: 1.4rem; display: block; margin-bottom: 3px; }
    .popup-data {
      font-size: 0.72rem;
      color: #888;
      margin-top: 8px;
      text-align: right;
    }

    .qr-panel {

      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      text-align: center;

l,"foto_3":null,"foto_4":null},"geometry":{"type":"Point","coordinates":[13.818028308042109,41.18267516712578]}}]};

// ═══════════════════════════════════════════════
//  INIZIALIZZAZIONE MAPPA
// ═══════════════════════════════════════════════

const map = L.map('map', { zoomControl: true }).setView([41.1810, 13.8195], 15);

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles © Esri', maxZoom: 20 }
);
const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '© OpenStreetMap contributors', maxZoom: 20 }
);
satellite.addTo(map);

// ═══════════════════════════════════════════════
//  LAYER SPECCHIO D'ACQUA
// ═══════════════════════════════════════════════
const layerAcqua = L.geoJSON(datiAcqua, {
  style: { color: '#0077cc', weight: 1.5, fillColor: '#4db8ff', fillOpacity: 0.45 }
}).bindPopup('💧 Specchio d\'acqua').addTo(map);

// ═══════════════════════════════════════════════
//  LAYER PASSERELLA
// ═══════════════════════════════════════════════
const layerPasserella = L.geoJSON(datiPasserella, {
  style: function(feature) {
    const t = (feature.properties.TRATTO || '').toUpperCase();
    if (t.includes('NO')) {
      return { color: '#aaa', weight: 1, fillColor: '#cccccc', fillOpacity: 0.35, dashArray: '6,4' };
    }
    return { color: '#8B5E3C', weight: 1.5, fillColor: '#D4A96A', fillOpacity: 0.65 };
  },
  onEachFeature: function(feature, layer) {
    const t = feature.properties.TRATTO || '';
    const isNo = t.toUpperCase().includes('NO');
    layer.bindPopup(`<b>${isNo ? '⚠️ Tratto senza passerella' : '🚶 ' + t}</b>`);
  }
}).addTo(map);

// ═══════════════════════════════════════════════
//  LAYER PUNTI BOTANICI
// ═══════════════════════════════════════════════
function iconaBotanica(specie) {
  const s = (specie || '').toLowerCase();
  let emoji = '🌿';
  if (s.includes('pinus') || s.includes('pino')) emoji = '🌲';
  else if (s.includes('quercus') || s.includes('leccio')) emoji = '🌳';
  else if (s.includes('populus') || s.includes('pioppo')) emoji = '🌳';
  else if (s.includes('palm') || s.includes('chamaerops')) emoji = '🌴';
  else if (s.includes('agave') || s.includes('yucca')) emoji = '🪴';
  else if (s.includes('acqua') || s.includes('typha') || s.includes('phragm') || s.includes('stagno')) emoji = '🌾';
  else if (s.includes('oleander') || s.includes('oleandro')) emoji = '🌸';
  else if (s.includes('laurus') || s.includes('alloro')) emoji = '🍃';
  else if (s.includes('pancratium') || s.includes('giglio')) emoji = '🌼';
  return L.divIcon({
    html: `<div style="background:rgba(255,255,255,0.92);border:2px solid #4a7c2f;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.35);cursor:pointer;">${emoji}</div>`,
    className: '', iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-16]
  });
}

function buildPopup(p) {
  const nomeDisplay = p.nome_com || p.specie_man || p.specie || 'Specie non identificata';
  const scientif = (p.specie && p.specie !== 'ALTRO') ? p.specie : (p.specie_man || '');
  const dataFmt = p.data_ril ? new Date(p.data_ril).toLocaleDateString('it-IT') : '';
  const fotoCount = [p.foto_1, p.foto_2, p.foto_3, p.foto_4].filter(Boolean).length;
  let html = `<div class="popup-botanico"><div class="popup-header"><div class="nome-comune">${nomeDisplay}</div>${scientif ? `<div class="nome-scientifico">${scientif}</div>` : ''}</div><div class="popup-body"><span class="popup-id">Rilievo #${p.id_albero}</span>`;
  if (p.note) html += `<div class="popup-note">📝 ${p.note}</div>`;
  if (fotoCount > 0) html += `<div class="popup-foto-placeholder"><span class="foto-icon">📸</span>${fotoCount} foto disponibil${fotoCount>1?'i':'e'}<br><small>Carica le foto su GitHub per visualizzarle</small></div>`;
  if (dataFmt) html += `<div class="popup-data">📅 Rilevato il ${dataFmt}</div>`;
  html += `</div></div>`;
  return html;
}

const layerEssenze = L.geoJSON(datiEssenze, {
  pointToLayer: function(feature, latlng) {
    return L.marker(latlng, { icon: iconaBotanica(feature.properties.nome_com || feature.properties.specie_man) });
  },
  onEachFeature: function(feature, layer) {
    layer.bindPopup(buildPopup(feature.properties), { maxWidth: 280 });
  }
}).addTo(map);

// ═══════════════════════════════════════════════
//  CONTROLLI LAYER
// ═══════════════════════════════════════════════
L.control.layers(
  { '🛰️ Satellite': satellite, '🗺️ OpenStreetMap': osm },
  { '🚶 Passerella': layerPasserella, '💧 Specchio d\'acqua': layerAcqua, '🌿 Punti botanici': layerEssenze },
  { position: 'topright', collapsed: false }
).addTo(map);

// ═══════════════════════════════════════════════
//  LEGENDA
// ═══════════════════════════════════════════════
const Legenda = L.Control.extend({
  onAdd: function() {
    const div = L.DomUtil.create('div', 'legenda');
    div.innerHTML = `<h4>Legenda</h4>
      <div class="legenda-item"><div class="legenda-color" style="background:#D4A96A;border:1.5px solid #8B5E3C"></div> Passerella</div>
      <div class="legenda-item"><div class="legenda-color" style="background:#ccc;border:1px dashed #aaa"></div> Tratto non accessibile</div>
      <div class="legenda-item"><div class="legenda-color" style="background:#4db8ff;border:1px solid #0077cc"></div> Specchio d'acqua</div>
      <div class="legenda-item"><div class="legenda-dot" style="background:#4a7c2f"></div> Punto botanico</div>`;
    return div;
  }
});
new Legenda({ position: 'bottomleft' }).addTo(map);

// ═══════════════════════════════════════════════
//  QR CODE
// ═══════════════════════════════════════════════
const QRPanel = L.Control.extend({
  onAdd: function() {
    const div = L.DomUtil.create('div', 'qr-panel');
    L.DomEvent.disableClickPropagation(div);
    div.innerHTML = '<div id="qrcode"></div><p>Scansiona per aprire</p>';
    return div;
  }
});
new QRPanel({ position: 'bottomright' }).addTo(map);

setTimeout(() => {
  const url = window.location.href.split('?')[0];
  new QRCode(document.getElementById('qrcode'), {
    text: url, width: 90, height: 90,
    colorDark: '#2d5a1b', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}, 300);

</script>
