/* ============================================================
   EPSG:3857 --> WGS84
   ============================================================ */
function merc2ll(x, y) {
  return [(x / 20037508.34) * 180,
          Math.atan(Math.exp(y * Math.PI / 20037508.34)) * 360 / Math.PI - 90];
}
function convCoords(c) {
  if (!Array.isArray(c)) return c;
  if (typeof c[0] === 'number') return merc2ll(c[0], c[1]);
  return c.map(convCoords);
}
function convFC(fc) {
  return {
    type: 'FeatureCollection',
    features: fc.features
      .filter(function(f) { return f && f.geometry && f.geometry.coordinates; })
      .map(function(f) {
        return { type: 'Feature', properties: f.properties,
          geometry: { type: f.geometry.type, coordinates: convCoords(f.geometry.coordinates) } };
      })
  };
}

/* ============================================================
   SLUG: "Pistacia lentiscus" --> "pistacia_lentiscus"
   Usato per il nome file della scheda tecnica botanica.
   ============================================================ */
function toSlug(s) {
  return s.trim().toLowerCase()
    .replace(/[aà]/g,'a').replace(/[eèé]/g,'e').replace(/[iì]/g,'i')
    .replace(/[oò]/g,'o').replace(/[uù]/g,'u')
    .replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
}

/* ============================================================
   ICONE – emoji su cerchio colorato per categoria botanica
   ============================================================ */
var iconRules = [
  { test: function(s,m){ return /pinus/i.test(s)||/pinus/i.test(m); },           emoji:'&#127794;', bg:'#6B4A1A' },
  { test: function(s,m){ return /quercus/i.test(s)||/quercus/i.test(m); },       emoji:'&#127795;', bg:'#1B5E20' },
  { test: function(s,m){ return /populus/i.test(s)||/populus/i.test(m); },       emoji:'&#127795;', bg:'#546E7A' },
  { test: function(s,m){ return /tamarix/i.test(s)||/tamarix/i.test(m); },       emoji:'&#127800;', bg:'#C2185B' },
  { test: function(s,m){ return /oleand/i.test(s)||/oleand/i.test(m); },         emoji:'&#127802;', bg:'#AD1457' },
  { test: function(s,m){ return /laurus/i.test(s)||/laurus/i.test(m); },         emoji:'&#127811;', bg:'#558B2F' },
  { test: function(s,m){ return /chamaerops/i.test(m); },                        emoji:'&#127796;', bg:'#F57F17' },
  { test: function(s,m){ return /agave/i.test(m); },                             emoji:'&#129716;', bg:'#00796B' },
  { test: function(s,m){ return /yucca/i.test(m); },                             emoji:'&#129716;', bg:'#00695C' },
  { test: function(s,m){ return /pancratium/i.test(m); },                        emoji:'&#127804;', bg:'#F9A825' },
  { test: function(s,m){ return /rosmarinus|rosmarino/i.test(m); },              emoji:'&#127807;', bg:'#2E7D32' },
  { test: function(s,m){ return /typha|phragmites|cannuccia/i.test(m); },        emoji:'&#127806;', bg:'#827717' },
  { test: function(s,m){ return /opuntia|ficus.indica/i.test(m); },              emoji:'&#127797;', bg:'#33691E' },
  { test: function(s,m){ return /centaurea/i.test(m); },                         emoji:'&#128156;', bg:'#7B1FA2' },
  { test: function(s,m){ return /euphorbia/i.test(m); },                         emoji:'&#127809;', bg:'#388E3C' },
  { test: function(s,m){ return /anthemis/i.test(m); },                          emoji:'&#127804;', bg:'#E6A817' }
];
var defIcon = { emoji:'&#127807;', bg:'#388E3C' };

function getConf(specie, specieMan) {
  var s = specie || '', m = specieMan || '';
  for (var i = 0; i < iconRules.length; i++) {
    if (iconRules[i].test(s, m)) return iconRules[i];
  }
  return defIcon;
}

function makeDivIcon(conf) {
  return L.divIcon({
    className: '',
    html: '<div class="plant-icon" style="background:' + conf.bg + '">' + conf.emoji + '</div>',
    iconSize: [32, 32], iconAnchor: [16, 16], popupAnchor: [0, -18]
  });
}

/* ============================================================
   POPUP
   ---------------------------------------------------------------
   Come caricare le immagini su GitHub:
   1. Crea una cartella "schede" nel repository
   2. Scheda informativa (una per punto):
      schede/info_172.jpg, schede/info_173.jpg, ...
   3. Scheda tecnica botanica (una per specie):
      schede/tecnica_pistacia_lentiscus.jpg
      schede/tecnica_pinus_pinaster.jpg  ecc.
   ============================================================ */
function buildPopup(p) {
  var id   = p.id_albero;
  var nome = p.nome_com || p.specie_man || '---';
  var sci  = p.specie_man || '';
  var data = p.data_ril  || '';
  var infoSrc = 'schede/info_' + id + '.jpg';

  var schedaHtml =
    '<img src="' + infoSrc + '" ' +
    'style="width:100%;border-radius:6px;margin-bottom:8px;display:block;" ' +
    'onerror="this.className=\'popup-scheda-missing\';this.src=\'\';this.alt=\'' +
    'Scheda informativa non ancora caricata (' + infoSrc + ')\';">';

  var btns = '';
  if (sci) {
    var parts = sci.split(',');
    for (var i = 0; i < parts.length; i++) {
      var sp = parts[i].trim();
      if (!sp || /^(ALTRO|gruppo)$/i.test(sp)) continue;
      btns += '<a class="btn-tecnica" href="schede/tecnica_' +
              toSlug(sp) + '.jpg" target="_blank">&#128302; ' + sp + '</a>';
    }
  }

  return '<div class="popup-wrap">' +
    '<div class="popup-title">' + nome + '</div>' +
    (sci ? '<div class="popup-sci">' + sci + '</div>' : '') +
    '<div class="popup-meta">ID: ' + id + ' &middot; ' + data + '</div>' +
    (p.note ? '<div class="popup-note">&#128221; ' + p.note + '</div>' : '') +
    schedaHtml +
    (btns ? '<div class="popup-btn-row">' + btns + '</div>' : '') +
    '</div>';
}

/* ============================================================
   MAPPA
   ============================================================ */
var map = L.map('map').setView([41.181, 13.820], 16);

var satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution: 'Tiles &copy; Esri', maxZoom: 20 }
);
var osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 20 }
);
satellite.addTo(map);

/* Acqua */
var acquaLayer = L.geoJSON(convFC(acquaRaw), {
  style: { color: '#1565C0', weight: 1.5, fillColor: '#42A5F5', fillOpacity: 0.45 }
}).addTo(map);

/* Passerella */
var passerellaLayer = L.geoJSON(convFC(passerellaRaw), {
  style: function(f) {
    var t = (f.properties.TRATTO || '').toUpperCase();
    return t.indexOf('NO') === 0
      ? { color: '#888', weight: 1.5, fillColor: '#ccc', fillOpacity: 0.3, dashArray: '8,5' }
      : { color: '#5D2E0C', weight: 2, fillColor: '#C47A3A', fillOpacity: 0.6 };
  },
  onEachFeature: function(f, layer) {
    var t = (f.properties.TRATTO || '').toUpperCase();
    layer.bindPopup(
      t.indexOf('NO') === 0
        ? '<b>Interruzione passerella</b><br><small style="color:#666">La camminata continua su mattonelle / laterizio</small>'
        : '<b>Passerella &ndash; ' + f.properties.TRATTO + '</b><br><small style="color:#666">Struttura in legno</small>'
    );
  }
}).addTo(map);

/* Alberi / Flora */
var alberiLayer = L.geoJSON(convFC(alberiRaw), {
  pointToLayer: function(f, latlng) {
    return L.marker(latlng, {
      icon: makeDivIcon(getConf(f.properties.specie, f.properties.specie_man))
    });
  },
  onEachFeature: function(f, layer) {
    layer.bindPopup(buildPopup(f.properties), { maxWidth: 300 });
  }
}).addTo(map);

/* Layer control */
L.control.layers(
  { 'Satellite (Esri)': satellite, 'OpenStreetMap': osm },
  { 'Passerella': passerellaLayer, 'Alberi / Flora': alberiLayer, 'Acqua': acquaLayer },
  { collapsed: false }
).addTo(map);

/* Legenda */
var legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  var div = L.DomUtil.create('div', 'legend');
  div.innerHTML =
    '<h4>Legenda</h4>' +
    '<div class="leg-row"><span class="leg-box" style="background:#C47A3A;border:1px solid #5D2E0C"></span>Passerella (struttura in legno)</div>' +
    '<div class="leg-row"><span class="leg-dash"></span>Interruzione &ndash; percorso su mattonelle</div>' +
    '<div class="leg-row"><span class="leg-box" style="background:#42A5F5;border:1px solid #1565C0"></span>Acqua</div>';
  return div;
};
legend.addTo(map);

</script>
